services:
  - type: web
    name: hs-license-server
    runtime: python
    rootDir: .
    buildCommand: pip install -r license_server/requirements.txt
    startCommand: uvicorn license_server.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HS_ADMIN_TOKEN
        sync: false
      - key: HS_LICENSE_DATABASE_URL
        sync: false
